<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MADIP Fintech System</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>
body { margin:0; font-family:Arial; background:#050816; color:white; }
canvas { position:fixed; top:0; left:0; z-index:-1; }

.container { max-width:1100px; margin:auto; padding:20px; }
.hidden { display:none; }

input, button {
  width:100%; padding:10px; margin:6px 0;
  border:none; border-radius:8px;
}

button {
  background:#22c55e; color:white;
  cursor:pointer;
}

.card {
  background:#1e293b;
  padding:15px;
  border-radius:10px;
  margin-top:10px;
}

table { width:100%; margin-top:20px; border-collapse:collapse; }
td, th { padding:10px; border-bottom:1px solid #334155; }

.badge { padding:5px 10px; border-radius:6px; }
.low { background:green; }
.medium { background:orange; }
.high { background:red; }

.step { display:none; }
.step.active { display:block; }

.progress { height:6px; background:#1e293b; }
.bar { height:6px; background:#22c55e; width:0%; }
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="container">

<!-- LOGIN -->
<div id="loginBox">
<h2>MADIP Login</h2>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="appContainer" class="hidden">

<h1>MADIP FINTECH SYSTEM</h1>

<h3>Register Client</h3>

<div class="progress"><div class="bar" id="bar"></div></div>

<div class="step active">
<input id="name" placeholder="Full Name">
<input id="id" placeholder="National ID">
<button onclick="next()">Next</button>
</div>

<div class="step">
<input id="county" placeholder="County">
<input id="town" placeholder="Town">
<button onclick="prev()">Back</button>
<button onclick="next()">Next</button>
</div>

<div class="step">
<input id="income" placeholder="Income">
<input id="amountInput" placeholder="Loan Amount">
<input type="file" id="photo">
<button onclick="prev()">Back</button>
<button onclick="submitClient()">Submit</button>
</div>

<h2>Dashboard</h2>

<div class="card">
<h3>Total Profit</h3>
<h2 id="profit">0</h2>
</div>

<div class="card">
<h3>Active Loans</h3>
<h2 id="activeLoans">0</h2>
</div>

<input id="search" placeholder="Search..." oninput="loadClients()">

<table>
<thead>
<tr>
<th>Name</th>
<th>Loan</th>
<th>Paid</th>
<th>Balance</th>
<th>Status</th>
<th>Risk</th>
<th>Action</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, updateDoc, deleteDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyB_cAjquKbtEcqcfdHiby9OIGTFwt2WFls",
  authDomain: "madip-fac8f.firebaseapp.com",
  projectId: "madip-fac8f",
  storageBucket: "madip-fac8f.firebasestorage.app",
  messagingSenderId: "228632767324",
  appId: "1:228632767324:web:07bd5fe00aeee29501ef99"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

/* LOGIN */
window.login = async function(){
  try {
    await signInWithEmailAndPassword(auth, email.value, password.value);
    loginBox.style.display="none";
    appContainer.classList.remove("hidden");
    loadClients();
  } catch(e){
    alert(e.message);
  }
};

/* STEPS */
let step=0;
const steps=document.querySelectorAll(".step");

window.next = function(){ if(step<steps.length-1) step++; show(); }
window.prev = function(){ if(step>0) step--; show(); }

function show(){
  steps.forEach(s=>s.classList.remove("active"));
  steps[step].classList.add("active");
  bar.style.width=((step+1)/steps.length)*100+"%";
}

/* RISK */
function calculateRisk(income, amount){
  let score = 50;
  if(income > 30000) score -= 15;
  if(amount > 20000) score += 20;

  if(score < 30) return "low";
  if(score < 70) return "medium";
  return "high";
}

/* SUBMIT */
window.submitClient = async function(){

  let file = photo.files[0];
  let url = "";

  if(file){
    const storageRef = ref(storage, "madip/"+Date.now()+file.name);
    await uploadBytes(storageRef, file);
    url = await getDownloadURL(storageRef);
  }

  let amount = Number(amountInput.value);

  let client = {
    name: name.value,
    id: id.value,
    income: Number(income.value),

    loanAmount: amount,
    amountPaid: 0,
    balance: amount,
    totalPayable: amount * 1.20,

    status: "active",
    risk: calculateRisk(Number(income.value), amount),

    photo: url,
    createdAt: new Date()
  };

  await addDoc(collection(db,"clients"), client);
  loadClients();
};

/* PAY */
window.pay = async function(id, paid, total){

  let p = prompt("Enter payment:");
  if(!p) return;

  p = Number(p);

  let newPaid = paid + p;
  let balance = total - newPaid;

  let status = balance <= 0 ? "cleared" : "active";

  await updateDoc(doc(db,"clients",id),{
    amountPaid:newPaid,
    balance:balance,
    status:status
  });

  loadClients();
};

/* LOAD */
window.loadClients = async function(){

  tbody.innerHTML="";

  let snap = await getDocs(query(collection(db,"clients"), orderBy("createdAt","desc")));

  let profit=0, active=0;

  let searchVal = search.value.toLowerCase();

  snap.forEach(docSnap=>{
    let c = docSnap.data();

    if(!c.name.toLowerCase().includes(searchVal)) return;

    if(c.status==="active") active++;
    profit += (c.totalPayable - c.loanAmount);

    let row=document.createElement("tr");

    row.innerHTML=`
      <td>${c.name}</td>
      <td>${c.loanAmount}</td>
      <td>${c.amountPaid}</td>
      <td>${c.balance}</td>
      <td>${c.status}</td>
      <td>${c.risk}</td>
      <td>
        <button onclick="pay('${docSnap.id}',${c.amountPaid},${c.totalPayable})">Pay</button>
        <button onclick="delClient('${docSnap.id}')">Delete</button>
      </td>
    `;

    tbody.appendChild(row);
  });

  profit.innerText = profit;
  activeLoans.innerText = active;
};

/* DELETE */
window.delClient = async function(id){
  await deleteDoc(doc(db,"clients",id));
  loadClients();
};

</script>

<script>
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
const renderer=new THREE.WebGLRenderer({canvas:bg});
renderer.setSize(innerWidth,innerHeight);

const geo=new THREE.TorusKnotGeometry(10,3,100,16);
const mat=new THREE.MeshBasicMaterial({color:0x22c55e,wireframe:true});
const mesh=new THREE.Mesh(geo,mat);

scene.add(mesh);
camera.position.z=30;

function animate(){
  requestAnimationFrame(animate);
  mesh.rotation.x+=0.005;
  mesh.rotation.y+=0.01;
  renderer.render(scene,camera);
}
animate();
</script>

</body>
  </html>
