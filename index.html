<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MADIP Pro Fintech System</title>

<!-- ================= LIBRARIES ================= -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<style>
/* ================= BASE UI ================= */
body {
  margin:0;
  font-family:Arial;
  background:#050816;
  color:white;
  overflow-x:hidden;
}

canvas#bg {
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}

/* ================= LAYOUT ================= */
.container {
  max-width:1200px;
  margin:auto;
  padding:20px;
}

h1,h2,h3 {
  margin:10px 0;
}

/* ================= INPUTS ================= */
input, select, button {
  width:100%;
  padding:10px;
  margin:6px 0;
  border:none;
  border-radius:8px;
  font-size:14px;
}

button {
  background:#22c55e;
  color:white;
  cursor:pointer;
  transition:0.2s;
}

button:hover {
  transform:scale(1.03);
}

/* ================= CARDS ================= */
.card {
  background:#1e293b;
  padding:15px;
  border-radius:12px;
  margin-top:10px;
  box-shadow:0 0 10px rgba(0,0,0,0.3);
}

.grid {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}

/* ================= STATUS ================= */
.badge {
  padding:5px 10px;
  border-radius:6px;
  font-size:12px;
}

.pending { background:orange; }
.approved { background:green; }
.rejected { background:red; }

.low { background:green; }
.medium { background:orange; }
.high { background:red; }

/* ================= SIGNATURE ================= */
#sign {
  background:white;
  border-radius:8px;
  margin-top:10px;
}

/* ================= DETAILS PANEL ================= */
#details {
  position:fixed;
  right:10px;
  top:10px;
  width:300px;
  background:#111827;
  padding:15px;
  border-radius:10px;
  display:none;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="container">

<!-- ================= HEADER ================= -->
<h1>💼 MADIP FINTECH SYSTEM</h1>

<p>Loan Management • Clients • Approval • PDF • Signature</p>

<!-- ================= FORM ================= -->
<div class="card">

<h2>Loan Application Form</h2>

<input id="name" placeholder="Full Name">
<input id="id" placeholder="National ID">
<input id="phone" placeholder="Phone Number">

<input id="county" placeholder="County">
<input id="town" placeholder="Town">

<select id="employment">
<option value="">Employment Status</option>
<option>Employed</option>
<option>Self-employed</option>
<option>Unemployed</option>
</select>

<input id="income" placeholder="Monthly Income">
<input id="amount" placeholder="Loan Amount">

<input id="guarantor" placeholder="Guarantor Name">
<input id="guarantorPhone" placeholder="Guarantor Phone">

<h3>✍ Signature</h3>
<canvas id="sign" width="300" height="120"></canvas>
<button onclick="clearSignature()">Clear Signature</button>

<button onclick="saveClient()">Save Client</button>

</div>

<!-- ================= DASHBOARD ================= -->
<h2>📊 Dashboard</h2>

<div class="grid">

<div class="card">
<h3>Total Clients</h3>
<h2 id="totalClients">0</h2>
</div>

<div class="card">
<h3>Approved Loans</h3>
<h2 id="approvedLoans">0</h2>
</div>

<div class="card">
<h3>Total Profit</h3>
<h2 id="profit">0</h2>
</div>

</div>

<!-- ================= CLIENT LIST ================= -->
<h2>📂 Clients</h2>
<div id="clients"></div>

</div>

<!-- ================= DETAILS ================= -->
<div id="details"></div>

<!-- ================= FIREBASE MODULE ================= -->
<script type="module">

/* ============ IMPORTS ============ */
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, updateDoc, doc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

/* ============ CONFIG ============ */
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ============ SIGNATURE PAD ============ */
const canvas = document.getElementById("sign");
const ctx = canvas.getContext("2d");
let drawing = false;

canvas.addEventListener("mousedown",()=>drawing=true);
canvas.addEventListener("mouseup",()=>drawing=false);
canvas.addEventListener("mousemove",(e)=>{
  if(!drawing) return;
  ctx.fillStyle="black";
  ctx.fillRect(e.offsetX,e.offsetY,2,2);
});

window.clearSignature = function(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
};

/* ============ SAVE CLIENT ============ */
window.saveClient = async function(){

  let signature = canvas.toDataURL();

  await addDoc(collection(db,"clients"),{
    name:name.value,
    id:id.value,
    phone:phone.value,
    county:county.value,
    town:town.value,
    employment:employment.value,
    income:Number(income.value),
    amount:Number(amount.value),
    guarantor:guarantor.value,
    guarantorPhone:guarantorPhone.value,
    signature:signature,
    status:"pending",
    createdAt:new Date()
  });

  loadClients();
};

/* ============ LOAD CLIENTS ============ */
async function loadClients(){

  clients.innerHTML="";

  let snap = await getDocs(collection(db,"clients"));

  let total=0;
  let approved=0;
  let profit=0;

  snap.forEach(docSnap=>{
    let c = docSnap.data();

    total++;
    if(c.status==="approved") approved++;

    profit += c.amount * 0.2;

    let div = document.createElement("div");
    div.className="card";

    div.innerHTML=`
      <h3>${c.name}</h3>
      <p>${c.amount}</p>
      <span class="badge ${c.status}">${c.status}</span>
    `;

    div.onclick=()=>showDetails(docSnap.id,c);

    clients.appendChild(div);
  });

  totalClients.innerText = total;
  approvedLoans.innerText = approved;
  profit.innerText = profit.toFixed(2);
}

/* ============ DETAILS ============ */
function showDetails(id,c){

  details.style.display="block";

  details.innerHTML=`
    <h3>${c.name}</h3>
    <p>Phone: ${c.phone}</p>
    <p>Loan: ${c.amount}</p>
    <p>Status: ${c.status}</p>

    <img src="${c.signature}" width="200"/>

    <button onclick="approve('${id}')">Approve</button>
    <button onclick="reject('${id}')">Reject</button>

    <button onclick='printLoan(${JSON.stringify(c)})'>Print</button>
    <button onclick='pdfLoan(${JSON.stringify(c)})'>PDF</button>
  `;
}

/* ============ APPROVAL ============ */
window.approve = async function(id){
  await updateDoc(doc(db,"clients",id),{status:"approved"});
  loadClients();
};

window.reject = async function(id){
  await updateDoc(doc(db,"clients",id),{status:"rejected"});
  loadClients();
};

/* ============ PRINT ============ */
window.printLoan = function(c){
  let w = window.open();
  w.document.write(`
    <h1>MADIP LOAN FORM</h1>
    <p>Name: ${c.name}</p>
    <p>Loan: ${c.amount}</p>
    <p>Status: ${c.status}</p>
  `);
  w.print();
};

/* ============ PDF ============ */
window.pdfLoan = function(c){
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  doc.text("MADIP LOAN CONTRACT",20,20);
  doc.text("Name: "+c.name,20,30);
  doc.text("Loan: "+c.amount,20,40);
  doc.text("Status: "+c.status,20,50);

  doc.save(c.name+"_MADIP.pdf");
};

/* LOAD INIT */
loadClients();

</script>

<!-- ================= WEBGL BACKGROUND ================= -->
<script>
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
const renderer = new THREE.WebGLRenderer({canvas:bg});
renderer.setSize(innerWidth,innerHeight);

const geo = new THREE.TorusKnotGeometry(10,3,100,16);
const mat = new THREE.MeshBasicMaterial({color:0x22c55e,wireframe:true});
const mesh = new THREE.Mesh(geo,mat);

scene.add(mesh);
camera.position.z=30;

function animate(){
  requestAnimationFrame(animate);
  mesh.rotation.x+=0.002;
  mesh.rotation.y+=0.004;
  renderer.render(scene,camera);
}

animate();
</script>

</body>
  </html>
